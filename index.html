<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard's Mountain Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        
        #gameContainer {
            position: relative;
            border: 5px solid #333;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game States
        const GAME_STATE = {
            START: 'start',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'gameOver',
            LEVEL_COMPLETE: 'levelComplete'
        };

        // Game Variables
        let gameState = GAME_STATE.START;
        let score = 0;
        let health = 3;
        let cameraX = 0;
        let levelWidth = 4000;

        // Wizard Class
        class Wizard {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 40;
                this.velocityY = 0;
                this.velocityX = 0;
                this.isJumping = false;
                this.speed = 5;
                this.jumpPower = 15;
                this.gravity = 0.6;
                this.onGround = false;
                this.direction = 1; // 1 for right, -1 for left
            }

            update() {
                // Apply gravity
                this.velocityY += this.gravity;
                this.y += this.velocityY;
                this.x += this.velocityX;

                // Friction
                this.velocityX *= 0.9;

                // Boundaries
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > levelWidth) this.x = levelWidth - this.width;

                // Check if on ground
                this.onGround = false;
                for (let platform of platforms) {
                    if (this.velocityY >= 0 &&
                        this.y + this.height <= platform.y + 5 &&
                        this.y + this.height >= platform.y - 5 &&
                        this.x + this.width > platform.x &&
                        this.x < platform.x + platform.width) {
                        this.y = platform.y - this.height;
                        this.velocityY = 0;
                        this.onGround = true;
                        this.isJumping = false;
                    }
                }

                // Death pit
                if (this.y > canvas.height) {
                    health--;
                    if (health <= 0) {
                        gameState = GAME_STATE.GAME_OVER;
                    } else {
                        this.reset();
                    }
                }

                // Win condition
                if (this.x > levelWidth - 100) {
                    gameState = GAME_STATE.LEVEL_COMPLETE;
                }

                // Camera follow with independent movement zone
                const cameraZoneWidth = 200;
                const targetCameraX = this.x - cameraZoneWidth;
                cameraX += (targetCameraX - cameraX) * 0.1;
                if (cameraX < 0) cameraX = 0;
                if (cameraX > levelWidth - canvas.width) cameraX = levelWidth - canvas.width;
            }

            jump() {
                if (this.onGround && !this.isJumping) {
                    this.velocityY = -this.jumpPower;
                    this.isJumping = true;
                }
            }

            moveLeft() {
                this.velocityX = -this.speed;
                this.direction = -1;
            }

            moveRight() {
                this.velocityX = this.speed;
                this.direction = 1;
            }

            shoot() {
                const fireballX = this.x + this.width / 2 + (this.direction * 15);
                const fireballY = this.y + this.height / 2;
                fireballs.push(new Fireball(fireballX, fireballY, this.direction));
            }

            reset() {
                this.x = 50;
                this.y = 300;
                this.velocityY = 0;
                this.velocityX = 0;
                this.isJumping = false;
            }

            draw() {
                // Draw wizard body
                ctx.fillStyle = '#9933FF';
                ctx.fillRect(this.x - cameraX, this.y, this.width, this.height);

                // Draw hat
                ctx.fillStyle = '#6600CC';
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX + this.width / 2, this.y - 10);
                ctx.lineTo(this.x - cameraX + 5, this.y);
                ctx.lineTo(this.x - cameraX + this.width - 5, this.y);
                ctx.closePath();
                ctx.fill();

                // Draw eyes
                ctx.fillStyle = '#FFFF00';
                ctx.fillRect(this.x - cameraX + 8, this.y + 10, 5, 5);
                ctx.fillRect(this.x - cameraX + 17, this.y + 10, 5, 5);

                // Draw staff
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX + this.width + 5, this.y);
                ctx.lineTo(this.x - cameraX + this.width + 5, this.y + this.height);
                ctx.stroke();

                // Draw staff star
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const radius = 5;
                    const px = this.x - cameraX + this.width + 5 + radius * Math.cos(angle);
                    const py = this.y - 5 + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            }
        }

        // Fireball Class
        class Fireball {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.width = 10;
                this.height = 10;
                this.velocityX = direction * 10;
                this.velocityY = -3;
                this.gravity = 0.3;
                this.lifetime = 60;
            }

            update() {
                this.velocityY += this.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.lifetime--;

                // Check collision with obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    if (this.x < obs.x + obs.width &&
                        this.x + this.width > obs.x &&
                        this.y < obs.y + obs.height &&
                        this.y + this.height > obs.y) {
                        obstacles.splice(i, 1);
                        score += 25;
                        this.lifetime = 0;
                    }
                }
            }

            draw() {
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y, this.width, 0, Math.PI * 2);
                ctx.fill();

                // Flame effect
                ctx.fillStyle = '#FFAA00';
                ctx.beginPath();
                ctx.arc(this.x - cameraX - 3, this.y, this.width * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Crystal Class
        class Crystal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 15;
                this.rotation = 0;
            }

            update() {
                // Check collision with wizard
                if (this.x < wizard.x + wizard.width &&
                    this.x + this.width > wizard.x &&
                    this.y < wizard.y + wizard.height &&
                    this.y + this.height > wizard.y) {
                    score += 50;
                    if (health < 3) health++;
                    return true; // Mark for removal
                }
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x - cameraX + this.width / 2, this.y + this.height / 2);
                this.rotation += 0.1;
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#00FF00';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.strokeStyle = '#00AA00';
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }

        // Initialize Game Objects
        let wizard = new Wizard(50, 300);
        let platforms = [];
        let obstacles = [];
        let crystals = [];
        let fireballs = [];
        let keys = {};

        // Create Level
        function createLevel() {
            platforms = [
                // Starting platform
                { x: 0, y: 550, width: 150, height: 50, type: 'grass' },
                // First section
                { x: 200, y: 500, width: 150, height: 20, type: 'wood' },
                { x: 400, y: 450, width: 150, height: 20, type: 'wood' },
                { x: 600, y: 400, width: 150, height: 20, type: 'wood' },
                // Descending section
                { x: 800, y: 480, width: 200, height: 20, type: 'wood' },
                { x: 1100, y: 520, width: 150, height: 20, type: 'wood' },
                // Ascending section
                { x: 1300, y: 450, width: 150, height: 20, type: 'wood' },
                { x: 1500, y: 400, width: 150, height: 20, type: 'wood' },
                { x: 1700, y: 350, width: 150, height: 20, type: 'wood' },
                // Platform challenge
                { x: 1900, y: 300, width: 100, height: 20, type: 'wood' },
                { x: 2050, y: 300, width: 100, height: 20, type: 'wood' },
                { x: 2200, y: 300, width: 100, height: 20, type: 'wood' },
                // Obstacle course
                { x: 2350, y: 500, width: 200, height: 20, type: 'wood' },
                { x: 2700, y: 480, width: 150, height: 20, type: 'wood' },
                { x: 2900, y: 460, width: 150, height: 20, type: 'wood' },
                // Final stretch
                { x: 3100, y: 400, width: 200, height: 20, type: 'wood' },
                { x: 3400, y: 500, width: 200, height: 20, type: 'wood' },
                { x: 3700, y: 520, width: 300, height: 30, type: 'grass' },
            ];

            obstacles = [
                { x: 250, y: 470, width: 30, height: 30, type: 'boulder' },
                { x: 450, y: 420, width: 40, height: 40, type: 'crate' },
                { x: 700, y: 370, width: 35, height: 35, type: 'boulder' },
                { x: 900, y: 450, width: 40, height: 40, type: 'crate' },
                { x: 1200, y: 490, width: 35, height: 35, type: 'boulder' },
                { x: 1400, y: 420, width: 40, height: 40, type: 'crate' },
                { x: 1600, y: 320, width: 35, height: 35, type: 'boulder' },
                { x: 2000, y: 270, width: 40, height: 40, type: 'crate' },
                { x: 2150, y: 270, width: 35, height: 35, type: 'boulder' },
                { x: 2450, y: 470, width: 40, height: 40, type: 'crate' },
                { x: 2600, y: 450, width: 35, height: 35, type: 'boulder' },
                { x: 2800, y: 430, width: 40, height: 40, type: 'crate' },
                { x: 3000, y: 430, width: 35, height: 35, type: 'boulder' },
                { x: 3200, y: 370, width: 40, height: 40, type: 'crate' },
                { x: 3500, y: 470, width: 35, height: 35, type: 'boulder' },
            ];

            crystals = [
                new Crystal(200, 450),
                new Crystal(400, 400),
                new Crystal(800, 450),
                new Crystal(1500, 370),
                new Crystal(1900, 270),
                new Crystal(2700, 430),
                new Crystal(3100, 370),
                new Crystal(3400, 450),
            ];
        }

        // Draw Functions
        function drawBackground() {
            // Sky gradient already set in canvas background
            // Mountains in background
            ctx.fillStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.beginPath();
            ctx.moveTo(-cameraX, 150);
            ctx.lineTo(100 - cameraX, 50);
            ctx.lineTo(300 - cameraX, 150);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(400 - cameraX, 150);
            ctx.lineTo(600 - cameraX, 30);
            ctx.lineTo(800 - cameraX, 150);
            ctx.closePath();
            ctx.fill();
        }

        function drawPlatforms() {
            for (let platform of platforms) {
                if (platform.type === 'wood') {
                    ctx.fillStyle = '#8B4513';
                } else {
                    ctx.fillStyle = '#228B22';
                }
                ctx.fillRect(platform.x - cameraX, platform.y, platform.width, platform.height);

                // Platform details
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x - cameraX, platform.y, platform.width, platform.height);
            }
        }

        function drawObstacles() {
            for (let obs of obstacles) {
                if (obs.type === 'boulder') {
                    ctx.fillStyle = '#696969';
                    ctx.beginPath();
                    ctx.arc(obs.x - cameraX + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#8B6914';
                    ctx.fillRect(obs.x - cameraX, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(obs.x - cameraX, obs.y, obs.width, obs.height);
                }
            }
        }

        function drawCrystals() {
            for (let crystal of crystals) {
                crystal.draw();
            }
        }

        function drawFireballs() {
            for (let fb of fireballs) {
                fb.draw();
            }
        }

        function drawUI() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 250, 80);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 20px Arial';
            ctx.fillText(`Score: ${score}`, 20, 35);
            ctx.fillText(`Health: ${'❤'.repeat(health)}`, 20, 60);

            // Progress bar
            const progressBar = (wizard.x / levelWidth) * 150;
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(20, 75, 150, 10);
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(20, 75, progressBar, 10);
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("Wizard's Mountain", canvas.width / 2, 100);
            ctx.fillText('Adventure', canvas.width / 2, 160);

            ctx.font = 'bold 30px Arial';
            ctx.fillText('Objectives:', canvas.width / 2, 240);

            ctx.font = '18px Arial';
            ctx.fillText('✓ Navigate through the mountain', canvas.width / 2, 280);
            ctx.fillText('✓ Collect green crystals for points', canvas.width / 2, 310);
            ctx.fillText('✓ Destroy obstacles with fireballs', canvas.width / 2, 340);
            ctx.fillText('✓ Reach the end of the level', canvas.width / 2, 370);

            ctx.font = 'bold 24px Arial';
            ctx.fillText('Controls:', canvas.width / 2, 420);
            ctx.font = '18px Arial';
            ctx.fillText('← → or A/D to move | SPACE to jump | Z to shoot', canvas.width / 2, 455);

            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Start!', canvas.width / 2, 530);
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FF0000';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, 150);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 300);

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Restart', canvas.width / 2, 450);
        }

        function drawLevelCompleteScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, 150);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 280);
            ctx.fillText(`Health: ${'❤'.repeat(health)}`, canvas.width / 2, 330);

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Play Again', canvas.width / 2, 450);

            ctx.fillStyle = '#00FF00';
            ctx.font = 'bold 28px Arial';
            ctx.fillText('Great Job! 🎉', canvas.width / 2, 520);
        }

        // Game Loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === GAME_STATE.START) {
                drawStartScreen();
            } else if (gameState === GAME_STATE.PLAYING) {
                // Update
                wizard.update();

                // Update fireballs
                for (let i = fireballs.length - 1; i >= 0; i--) {
                    fireballs[i].update();
                    if (fireballs[i].lifetime <= 0) {
                        fireballs.splice(i, 1);
                    }
                }

                // Update crystals
                for (let i = crystals.length - 1; i >= 0; i--) {
                    if (crystals[i].update()) {
                        crystals.splice(i, 1);
                    }
                }

                // Check collision with obstacles
                for (let obs of obstacles) {
                    if (wizard.x < obs.x + obs.width &&
                        wizard.x + wizard.width > obs.x &&
                        wizard.y + wizard.height < obs.y + obs.height &&
                        wizard.y + wizard.height > obs.y) {
                        health--;
                        if (health <= 0) {
                            gameState = GAME_STATE.GAME_OVER;
                        } else {
                            wizard.reset();
                        }
                    }
                }

                // Draw
                drawBackground();
                drawPlatforms();
                drawObstacles();
                drawCrystals();
                wizard.draw();
                drawFireballs();
                drawUI();
            } else if (gameState === GAME_STATE.GAME_OVER) {
                drawGameOverScreen();
            } else if (gameState === GAME_STATE.LEVEL_COMPLETE) {
                drawLevelCompleteScreen();
            }

            requestAnimationFrame(gameLoop);
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState === GAME_STATE.START) {
                    gameState = GAME_STATE.PLAYING;
                    createLevel();
                } else if (gameState === GAME_STATE.PLAYING) {
                    wizard.jump();
                } else if (gameState === GAME_STATE.GAME_OVER || gameState === GAME_STATE.LEVEL_COMPLETE) {
                    // Reset game
                    score = 0;
                    health = 3;
                    cameraX = 0;
                    wizard.reset();
                    fireballs = [];
                    gameState = GAME_STATE.START;
                }
            }

            if (e.key === 'z' || e.key === 'Z') {
                if (gameState === GAME_STATE.PLAYING) {
                    wizard.shoot();
                }
            }

            if (e.key === 'Escape') {
                if (gameState === GAME_STATE.PLAYING) {
                    gameState = GAME_STATE.PAUSED;
                } else if (gameState === GAME_STATE.PAUSED) {
                    gameState = GAME_STATE.PLAYING;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('click', () => {
            if (gameState === GAME_STATE.PLAYING) {
                wizard.shoot();
            }
        });

        // Handle continuous movement
        setInterval(() => {
            if (gameState === GAME_STATE.PLAYING) {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    wizard.moveLeft();
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    wizard.moveRight();
                }
            }
        }, 20);

        // Start game
        gameLoop();
    </script>
</body>
</html>
