<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard's Mountain Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        
        #gameContainer {
            position: relative;
            border: 5px solid #333;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game States
        const GAME_STATE = {
            START: 'start',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'gameOver',
            LEVEL_COMPLETE: 'levelComplete'
        };

        // Game Variables
        let gameState = GAME_STATE.START;
        let score = 0;
        const MAX_HEALTH = 5;
        let health = MAX_HEALTH;
        let cameraX = 0;
        let levelWidth = 4000;
        let obstacleDamageCooldown = 0;
        let currentDifficulty = { stage: 1, label: 'Apprentice' };
        const COYOTE_FRAMES = 8;
        const JUMP_BUFFER_FRAMES = 10;
        let tutorialMessage = '';
        let tutorialMessageTimer = 0;
        let tutorialBeatIndex = 0;
        let tutorialMaxBeatReached = 0;
        let tutorialBeatFrameCounter = 0;
        let jumpActionCount = 0;
        let shootActionCount = 0;
        let obstaclesDestroyed = 0;
        let chosenRoute = null;
        let routeMessage = '';
        let routeMessageTimer = 0;

        const STORYBOARD_BEATS = [
            {
                id: 'jump-box',
                message: 'Oh no! The box is blocking your way. Jump!',
                triggerX: 120,
                complete: () => jumpActionCount > 0 && wizard.x > 300,
                fallbackComplete: () => wizard.x > 520,
                maxFrames: 540,
                cue: { type: 'obstacle', x: 360, y: 485, width: 40, height: 35 }
            },
            {
                id: 'great-job-1',
                message: 'Great jump!',
                type: 'success',
                triggerX: 320,
                complete: () => wizard.x > 620
            },
            {
                id: 'jump-there',
                message: 'Should you jump on there?',
                triggerX: 700,
                complete: () => wizard.x > 980 && jumpActionCount > 1,
                fallbackComplete: () => wizard.x > 1120,
                maxFrames: 480,
                cue: { type: 'platform', x: 1030, y: 500, width: 190, height: 20 }
            },
            {
                id: 'shoot-obstacle',
                message: 'Shoot wooden obstacles to knock them down!',
                triggerX: 1120,
                complete: () => obstaclesDestroyed > 0,
                fallbackComplete: () => wizard.x > 1520,
                maxFrames: 700,
                cue: { type: 'obstacle', x: 1510, y: 370, width: 56, height: 50 }
            },
            {
                id: 'jump-other-platform',
                message: 'Choose your path: upper ramp or lower ramp!',
                triggerX: 1700,
                complete: () => wizard.x > 2440,
                fallbackComplete: () => wizard.x > 2550,
                maxFrames: 600,
                cue: { type: 'platform', x: 2060, y: 360, width: 260, height: 20 }
            },
            {
                id: 'rock-jump',
                message: 'The rock is running towards you. JUMP!',
                triggerX: 2320,
                complete: () => wizard.x > 2700,
                fallbackComplete: () => wizard.x > 2850,
                maxFrames: 620,
                cue: { type: 'obstacle', x: 2680, y: 420, width: 35, height: 35 }
            },
            {
                id: 'good-job-2',
                message: 'Good job dodging the rock!',
                type: 'success',
                triggerX: 2720,
                complete: () => wizard.x > 2950
            },
            {
                id: 'do-you-want-jump',
                message: 'Jump on that platform!',
                triggerX: 3000,
                complete: () => wizard.x > 3400,
                fallbackComplete: () => wizard.x > 3600,
                maxFrames: 520,
                cue: { type: 'platform', x: 3440, y: 500, width: 130, height: 20 }
            }
        ];

        // Wizard Class
        class Wizard {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 40;
                this.velocityY = 0;
                this.velocityX = 0;
                this.isJumping = false;
                this.speed = 4.5;
                this.jumpPower = 16;
                this.gravity = 0.55;
                this.onGround = false;
                this.direction = 1; // 1 for right, -1 for left
                this.walkFrame = 0;
                this.coyoteTimer = 0;
                this.jumpBufferTimer = 0;
            }

            update() {
                const previousY = this.y;

                // Apply gravity
                this.velocityY += this.gravity;
                this.y += this.velocityY;
                this.x += this.velocityX;
                this.walkFrame += Math.abs(this.velocityX) * 0.25;

                // Friction
                this.velocityX *= 0.9;

                // Boundaries
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > levelWidth) this.x = levelWidth - this.width;

                // Check if on ground
                this.onGround = false;
                const previousBottom = previousY + this.height;
                const currentBottom = this.y + this.height;
                const supportSurfaces = getSupportSurfaces();

                for (let surface of supportSurfaces) {
                    const horizontalOverlap = this.x + this.width > surface.x && this.x < surface.x + surface.width;
                    const crossedSurfaceTop = previousBottom <= surface.y + 1 && currentBottom >= surface.y;

                    if (this.velocityY >= 0 && horizontalOverlap && crossedSurfaceTop) {
                        this.y = surface.y - this.height;
                        this.velocityY = 0;
                        this.onGround = true;
                        this.isJumping = false;
                        this.coyoteTimer = COYOTE_FRAMES;
                        break;
                    }
                }

                if (!this.onGround) {
                    this.coyoteTimer = Math.max(0, this.coyoteTimer - 1);
                }

                if (this.jumpBufferTimer > 0) {
                    this.jumpBufferTimer--;
                    const canJumpNow = (this.onGround || this.coyoteTimer > 0) && !this.isJumping;
                    if (canJumpNow) {
                        this.velocityY = -this.jumpPower;
                        this.isJumping = true;
                        this.onGround = false;
                        this.coyoteTimer = 0;
                        this.jumpBufferTimer = 0;
                        jumpActionCount++;
                    }
                }

                // Death pit
                if (this.y > canvas.height) {
                    // Make early game more forgiving for kids.
                    if (currentDifficulty.stage === 1) {
                        resetTutorialFlow(true, true);
                        this.reset();
                    } else {
                        health--;
                        if (health <= 0) {
                            gameState = GAME_STATE.GAME_OVER;
                        } else {
                            resetTutorialFlow(true, true);
                            this.reset();
                        }
                    }
                }

                // Win condition
                if (this.x > levelWidth - 100) {
                    gameState = GAME_STATE.LEVEL_COMPLETE;
                }

                // Camera follow with independent movement zone
                const cameraZoneWidth = 200;
                const targetCameraX = this.x - cameraZoneWidth;
                cameraX += (targetCameraX - cameraX) * 0.1;
                if (cameraX < 0) cameraX = 0;
                if (cameraX > levelWidth - canvas.width) cameraX = levelWidth - canvas.width;
            }

            jump() {
                this.jumpBufferTimer = JUMP_BUFFER_FRAMES;
                if ((this.onGround || this.coyoteTimer > 0) && !this.isJumping) {
                    this.velocityY = -this.jumpPower;
                    this.isJumping = true;
                    this.onGround = false;
                    this.coyoteTimer = 0;
                    this.jumpBufferTimer = 0;
                    jumpActionCount++;
                }
            }

            moveLeft() {
                this.velocityX = -this.speed;
                this.direction = -1;
            }

            moveRight() {
                this.velocityX = this.speed;
                this.direction = 1;
            }

            shoot() {
                const fireballX = this.x + this.width / 2 + (this.direction * 15);
                const fireballY = this.y + this.height / 2;
                fireballs.push(new Fireball(fireballX, fireballY, this.direction));
            }

            reset() {
                this.x = 50;
                this.y = 300;
                this.velocityY = 0;
                this.velocityX = 0;
                this.isJumping = false;
                this.coyoteTimer = 0;
                this.jumpBufferTimer = 0;
            }

            draw() {
                const screenX = this.x - cameraX;
                const robeHeight = this.height - 10;
                const legSwing = Math.sin(this.walkFrame) * 2;

                // Draw wizard body
                ctx.fillStyle = '#9933FF';
                ctx.fillRect(screenX, this.y, this.width, robeHeight);

                // Draw legs
                ctx.fillStyle = '#2F2F5F';
                ctx.fillRect(screenX + 7, this.y + robeHeight, 6, 10 + legSwing);
                ctx.fillRect(screenX + 17, this.y + robeHeight, 6, 10 - legSwing);

                // Draw hat
                ctx.fillStyle = '#6600CC';
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2, this.y - 10);
                ctx.lineTo(screenX + 5, this.y);
                ctx.lineTo(screenX + this.width - 5, this.y);
                ctx.closePath();
                ctx.fill();

                // Draw eyes
                ctx.fillStyle = '#FFFF00';
                ctx.fillRect(screenX + 8, this.y + 10, 5, 5);
                ctx.fillRect(screenX + 17, this.y + 10, 5, 5);

                // Draw staff
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(screenX + this.width + 5, this.y);
                ctx.lineTo(screenX + this.width + 5, this.y + this.height);
                ctx.stroke();

                // Draw staff star
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                    const radius = 5;
                    const px = screenX + this.width + 5 + radius * Math.cos(angle);
                    const py = this.y - 5 + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            }
        }

        // Fireball Class
        class Fireball {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.width = 10;
                this.height = 10;
                this.velocityX = direction * 10;
                this.velocityY = -3;
                this.gravity = 0.3;
                this.lifetime = 60;
            }

            update() {
                this.velocityY += this.gravity;
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.lifetime--;

                // Check collision with obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    let obs = obstacles[i];
                    if (!isObstacleActive(obs)) continue;
                    const hitPadding = 6;
                    const hasHit = this.x < obs.x + obs.width + hitPadding &&
                        this.x + this.width > obs.x - hitPadding &&
                        this.y < obs.y + obs.height + hitPadding &&
                        this.y + this.height > obs.y - hitPadding;

                    if (hasHit) {
                        if (isStoneObstacle(obs)) {
                            this.lifetime = 0;
                            break;
                        }
                        if (isDestructibleObstacle(obs)) {
                            const wizardStandingOnObs = wizard.x + wizard.width > obs.x &&
                                wizard.x < obs.x + obs.width &&
                                Math.abs((wizard.y + wizard.height) - obs.y) <= 2 &&
                                wizard.velocityY >= 0;

                            if (isClimbableObstacle(obs) && wizardStandingOnObs) {
                                this.lifetime = 0;
                                break;
                            }

                            obstacles.splice(i, 1);
                            score += 25;
                            obstaclesDestroyed++;
                        }
                        this.lifetime = 0;
                    }
                }
            }

            draw() {
                ctx.fillStyle = '#FF6600';
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y, this.width, 0, Math.PI * 2);
                ctx.fill();

                // Flame effect
                ctx.fillStyle = '#FFAA00';
                ctx.beginPath();
                ctx.arc(this.x - cameraX - 3, this.y, this.width * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Crystal Class
        class Crystal {
            constructor(x, y, options = {}) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 15;
                this.rotation = 0;
                this.value = options.value || 50;
                this.heal = options.heal !== undefined ? options.heal : true;
                this.fillColor = options.fillColor || '#00FF00';
                this.strokeColor = options.strokeColor || '#00AA00';
            }

            update() {
                // Check collision with wizard
                if (this.x < wizard.x + wizard.width &&
                    this.x + this.width > wizard.x &&
                    this.y < wizard.y + wizard.height &&
                    this.y + this.height > wizard.y) {
                    score += this.value;
                    if (this.heal && health < MAX_HEALTH) health++;
                    return true; // Mark for removal
                }
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x - cameraX + this.width / 2, this.y + this.height / 2);
                this.rotation += 0.1;
                ctx.rotate(this.rotation);
                ctx.fillStyle = this.fillColor;
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.strokeStyle = this.strokeColor;
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
                ctx.restore();
            }
        }

        // Initialize Game Objects
        let wizard = new Wizard(50, 300);
        let platforms = [];
        let obstacles = [];
        let crystals = [];
        let fireballs = [];
        let signs = [];
        let keys = {};

        // Create Level
        function createLevel() {
            platforms = [
                // Starting platform
                { x: 0, y: 550, width: 260, height: 50, type: 'grass' },
                // Easy section
                { x: 280, y: 520, width: 260, height: 20, type: 'wood' },
                { x: 560, y: 500, width: 250, height: 20, type: 'wood' },
                { x: 830, y: 485, width: 240, height: 20, type: 'wood' },
                { x: 1090, y: 500, width: 250, height: 20, type: 'wood' },
                // Medium section
                { x: 1370, y: 460, width: 240, height: 20, type: 'wood' },
                { x: 1630, y: 420, width: 230, height: 20, type: 'wood' },
                { x: 1880, y: 380, width: 220, height: 20, type: 'wood' },
                // Decision fork: upper ramp path
                { x: 2060, y: 360, width: 260, height: 20, type: 'wood' },
                { x: 2320, y: 320, width: 230, height: 20, type: 'wood' },
                // Decision fork: lower ramp path
                { x: 2060, y: 460, width: 260, height: 20, type: 'wood' },
                { x: 2320, y: 500, width: 230, height: 20, type: 'wood' },
                // Merge after fork
                { x: 2580, y: 430, width: 220, height: 20, type: 'wood' },
                // Harder section
                { x: 2660, y: 450, width: 140, height: 20, type: 'wood' },
                { x: 2860, y: 430, width: 130, height: 20, type: 'wood' },
                // Final challenge section
                { x: 3060, y: 390, width: 140, height: 20, type: 'wood' },
                { x: 3260, y: 450, width: 120, height: 20, type: 'wood' },
                { x: 3440, y: 500, width: 130, height: 20, type: 'wood' },
                { x: 3700, y: 520, width: 300, height: 30, type: 'grass' },
            ];

            obstacles = [
                // Storyboard intro box
                { x: 360, y: 485, width: 56, height: 40, type: 'tutorialBox', activationX: 100 },
                // No early obstacles until kids learn movement
                { x: 1320, y: 420, width: 35, height: 35, type: 'boulder', activationX: 1100 },
                { x: 1510, y: 370, width: 56, height: 50, type: 'crate', activationX: 1150 },
                { x: 1730, y: 330, width: 35, height: 35, type: 'boulder', activationX: 1400 },
                { x: 2080, y: 220, width: 56, height: 50, type: 'crate', activationX: 1750 },
                { x: 2260, y: 205, width: 35, height: 35, type: 'boulder', activationX: 1950 },
                { x: 2440, y: 440, width: 90, height: 60, type: 'destructibleWall', activationX: 2150 },
                { x: 2680, y: 420, width: 35, height: 35, type: 'rock', activationX: 2400, moveRange: 50, startX: 2680, direction: -1, moveSpeed: 0.5 },
                { x: 2880, y: 400, width: 56, height: 50, type: 'crate', activationX: 2550 },
                { x: 3180, y: 340, width: 90, height: 60, type: 'destructibleWall', activationX: 2900 },
                { x: 3090, y: 360, width: 35, height: 35, type: 'boulder', activationX: 2800, moveRange: 45, startX: 3090, direction: 1, moveSpeed: 0.6 },
                { x: 3285, y: 420, width: 56, height: 50, type: 'crate', activationX: 3000, moveRange: 55, startX: 3285, direction: -1, moveSpeed: 0.6 },
                { x: 3470, y: 470, width: 35, height: 35, type: 'boulder', activationX: 3250 },
            ];

            crystals = [
                // More crystals early to help kids recover health and score
                new Crystal(230, 480),
                new Crystal(520, 460),
                new Crystal(780, 430),
                new Crystal(1030, 460),
                new Crystal(1280, 410),
                new Crystal(1700, 320),
                // Lower route: safer with extra healing crystals
                new Crystal(2140, 430, { value: 50, heal: true }),
                new Crystal(2360, 470, { value: 50, heal: true }),
                // Upper route: riskier with bonus score crystals
                new Crystal(2140, 300, { value: 90, heal: false, fillColor: '#FFD700', strokeColor: '#CC9A00' }),
                new Crystal(2360, 260, { value: 90, heal: false, fillColor: '#FFD700', strokeColor: '#CC9A00' }),
                new Crystal(2660, 410),
                new Crystal(3060, 350),
                new Crystal(3440, 460),
            ];

            signs = [
                { x: 1860, y: 455, text: 'Upper: Tricky + Bonus', color: '#FFE066' },
                { x: 1860, y: 505, text: 'Lower: Safer + Healing', color: '#A9FF70' }
            ];

            chosenRoute = null;
            routeMessage = '';
            routeMessageTimer = 0;
        }

        function getDifficultyByPosition() {
            if (wizard.x < 650) return { stage: 1, label: 'Apprentice' };
            if (wizard.x < 1550) return { stage: 2, label: 'Explorer' };
            if (wizard.x < 2600) return { stage: 3, label: 'Mage' };
            return { stage: 4, label: 'Archmage' };
        }

        function isObstacleActive(obstacle) {
            if (!obstacle.activationX) return true;
            return wizard.x >= obstacle.activationX;
        }

        function isStoneObstacle(obstacle) {
            return obstacle.type === 'boulder' || obstacle.type === 'rock';
        }

        function isDestructibleObstacle(obstacle) {
            return obstacle.type === 'crate' || obstacle.type === 'tutorialBox' || obstacle.type === 'destructibleWall';
        }

        function isClimbableObstacle(obstacle) {
            return obstacle.type === 'crate' || obstacle.type === 'tutorialBox';
        }

        function getSupportSurfaces() {
            const surfaces = platforms.map((platform) => ({
                x: platform.x,
                y: platform.y,
                width: platform.width,
                height: platform.height,
                type: 'platform'
            }));

            for (let obstacle of obstacles) {
                if (!isObstacleActive(obstacle) || !isClimbableObstacle(obstacle)) continue;
                surfaces.push({
                    x: obstacle.x,
                    y: obstacle.y,
                    width: obstacle.width,
                    height: obstacle.height,
                    type: 'obstacle'
                });
            }

            surfaces.sort((a, b) => a.y - b.y);
            return surfaces;
        }

        function updateObstacles() {
            for (let obs of obstacles) {
                if (!isObstacleActive(obs) || !obs.moveRange) continue;

                const stageSpeedBoost = (currentDifficulty.stage - 1) * 0.07;
                const moveSpeed = obs.moveSpeed + stageSpeedBoost;
                obs.x += moveSpeed * obs.direction;

                if (obs.x > obs.startX + obs.moveRange || obs.x < obs.startX - obs.moveRange) {
                    obs.direction *= -1;
                }
            }
        }

        function setTutorialMessage(message, duration = 210) {
            tutorialMessage = message;
            tutorialMessageTimer = duration;
        }

        function resetTutorialFlow(showFirstMessage = false, resumeProgress = false) {
            tutorialMessage = '';
            tutorialMessageTimer = 0;
            tutorialBeatIndex = resumeProgress ? Math.min(tutorialMaxBeatReached, STORYBOARD_BEATS.length - 1) : 0;
            if (!resumeProgress) tutorialMaxBeatReached = 0;
            tutorialBeatFrameCounter = 0;
            if (!resumeProgress) {
                jumpActionCount = 0;
                shootActionCount = 0;
                obstaclesDestroyed = 0;
            }

            if (showFirstMessage && STORYBOARD_BEATS.length > 0) {
                setTutorialMessage(STORYBOARD_BEATS[tutorialBeatIndex].message, 220);
            }
        }

        function advanceTutorialBeat() {
            tutorialBeatIndex++;
            tutorialMaxBeatReached = Math.max(tutorialMaxBeatReached, tutorialBeatIndex);
            tutorialBeatFrameCounter = 0;
            if (tutorialBeatIndex < STORYBOARD_BEATS.length) {
                setTutorialMessage(STORYBOARD_BEATS[tutorialBeatIndex].message, 220);
            }
        }

        function updateStoryboardFlow() {
            if (gameState !== GAME_STATE.PLAYING) return;
            if (tutorialBeatIndex >= STORYBOARD_BEATS.length) {
                if (tutorialMessageTimer > 0) tutorialMessageTimer--;
                return;
            }

            const currentBeat = STORYBOARD_BEATS[tutorialBeatIndex];
            if (wizard.x < currentBeat.triggerX) {
                if (tutorialMessageTimer > 0) tutorialMessageTimer--;
                return;
            }

            tutorialBeatFrameCounter++;

            if (!tutorialMessage || tutorialMessageTimer <= 0) {
                setTutorialMessage(currentBeat.message, currentBeat.type === 'success' ? 120 : 220);
            }

            const passedByAction = currentBeat.complete();
            const canFallback = currentBeat.fallbackComplete && currentBeat.maxFrames && tutorialBeatFrameCounter > currentBeat.maxFrames;
            const passedByFallback = canFallback ? currentBeat.fallbackComplete() : false;

            if (passedByAction || passedByFallback) {
                advanceTutorialBeat();
                return;
            }

            if (tutorialMessageTimer > 0) tutorialMessageTimer--;
        }

        function updateRouteChoice() {
            if (chosenRoute !== null) return;
            if (wizard.x < 2100 || wizard.x > 2600) return;

            const routeSplitY = 415;
            chosenRoute = wizard.y <= routeSplitY ? 'upper' : 'lower';
            routeMessage = chosenRoute === 'upper'
                ? 'You chose Upper Ramp! Bonus score path.'
                : 'You chose Lower Ramp! Safer healing path.';
            routeMessageTimer = 110;
        }

        // Draw Functions
        function drawBackground() {
            // Sky gradient already set in canvas background
            // Mountains in background
            ctx.fillStyle = 'rgba(139, 69, 19, 0.3)';
            ctx.beginPath();
            ctx.moveTo(-cameraX, 150);
            ctx.lineTo(100 - cameraX, 50);
            ctx.lineTo(300 - cameraX, 150);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(400 - cameraX, 150);
            ctx.lineTo(600 - cameraX, 30);
            ctx.lineTo(800 - cameraX, 150);
            ctx.closePath();
            ctx.fill();
        }

        function drawPlatforms() {
            for (let platform of platforms) {
                if (platform.type === 'wood') {
                    ctx.fillStyle = '#8B4513';
                } else {
                    ctx.fillStyle = '#228B22';
                }
                ctx.fillRect(platform.x - cameraX, platform.y, platform.width, platform.height);

                // Platform details
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.strokeRect(platform.x - cameraX, platform.y, platform.width, platform.height);
            }
        }

        function drawObstacles() {
            for (let obs of obstacles) {
                if (!isObstacleActive(obs)) continue;
                if (obs.type === 'boulder' || obs.type === 'rock') {
                    ctx.fillStyle = '#696969';
                    ctx.beginPath();
                    ctx.arc(obs.x - cameraX + obs.width / 2, obs.y + obs.height / 2, obs.width / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    if (obs.type === 'rock') {
                        ctx.fillStyle = '#B0B0B0';
                        ctx.beginPath();
                        ctx.arc(obs.x - cameraX + 10, obs.y + 10, 4, 0, Math.PI * 2);
                        ctx.arc(obs.x - cameraX + 22, obs.y + 22, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    ctx.fillStyle = '#8B6914';
                    if (obs.type === 'tutorialBox') {
                        ctx.fillStyle = '#9C6B3B';
                    } else if (obs.type === 'destructibleWall') {
                        ctx.fillStyle = '#A56A2F';
                    }
                    ctx.fillRect(obs.x - cameraX, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(obs.x - cameraX, obs.y, obs.width, obs.height);
                }
            }
        }

        function drawCrystals() {
            for (let crystal of crystals) {
                crystal.draw();
            }
        }

        function drawFireballs() {
            for (let fb of fireballs) {
                fb.draw();
            }
        }

        function drawSigns() {
            if (chosenRoute !== null) return;
            if (wizard.x < 1650 || wizard.x > 2260) return;

            for (let sign of signs) {
                const sx = sign.x - cameraX;
                const signWidth = 210;
                if (sx < -(signWidth + 20) || sx > canvas.width + 40) continue;

                ctx.fillStyle = '#5B3A1C';
                ctx.fillRect(sx + 12, sign.y - 26, 6, 26);

                ctx.fillStyle = 'rgba(25, 25, 25, 0.75)';
                ctx.fillRect(sx, sign.y - 54, signWidth, 24);
                ctx.strokeStyle = sign.color;
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, sign.y - 54, signWidth, 24);

                ctx.fillStyle = sign.color;
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(sign.text, sx + 8, sign.y - 37);
            }
        }

        function drawForkArrows() {
            if (chosenRoute !== null) return;
            if (wizard.x < 1820 || wizard.x > 2060) return;
            const pulses = Math.sin(Date.now() / 180) * 4;
            const forkX = 1960 - cameraX;

            if (forkX > -200 && forkX < canvas.width + 200) {
                // Upper route arrow
                ctx.fillStyle = '#FFE066';
                ctx.beginPath();
                ctx.moveTo(forkX + 10, 410 + pulses);
                ctx.lineTo(forkX + 70, 340 + pulses);
                ctx.lineTo(forkX + 52, 340 + pulses);
                ctx.lineTo(forkX + 52, 328 + pulses);
                ctx.lineTo(forkX + 84, 348 + pulses);
                ctx.lineTo(forkX + 52, 370 + pulses);
                ctx.lineTo(forkX + 52, 358 + pulses);
                ctx.lineTo(forkX + 10, 410 + pulses);
                ctx.closePath();
                ctx.fill();

                // Lower route arrow
                ctx.fillStyle = '#A9FF70';
                ctx.beginPath();
                ctx.moveTo(forkX + 10, 430 - pulses);
                ctx.lineTo(forkX + 70, 500 - pulses);
                ctx.lineTo(forkX + 52, 500 - pulses);
                ctx.lineTo(forkX + 52, 512 - pulses);
                ctx.lineTo(forkX + 84, 492 - pulses);
                ctx.lineTo(forkX + 52, 470 - pulses);
                ctx.lineTo(forkX + 52, 482 - pulses);
                ctx.lineTo(forkX + 10, 430 - pulses);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawUI() {
            const panelX = canvas.width - 232;
            const panelY = 10;
            const panelW = 220;
            const panelH = 92;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fillRect(panelX, panelY, panelW, panelH);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, panelX + 10, panelY + 24);
            ctx.fillText(`Health: ${'❤'.repeat(health)}`, panelX + 10, panelY + 46);
            ctx.fillText(`Difficulty: ${currentDifficulty.label}`, panelX + 10, panelY + 68);

            // Progress bar
            const progressBar = (wizard.x / levelWidth) * 90;
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(panelX + 118, panelY + 76, 90, 10);
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(panelX + 118, panelY + 76, progressBar, 10);
        }

        function drawRouteMessage() {
            if (!routeMessage || routeMessageTimer <= 0) return;

            const panelX = canvas.width - 232;
            const panelY = 10;
            const alpha = Math.max(0.35, Math.min(1, routeMessageTimer / 110));

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(25, 25, 25, 0.72)';
            ctx.fillRect(panelX, panelY + 96, 220, 22);

            ctx.textAlign = 'left';
            ctx.font = 'bold 13px Arial';
            ctx.fillStyle = chosenRoute === 'upper' ? '#FFE066' : '#A9FF70';
            ctx.fillText(chosenRoute === 'upper' ? 'Upper route selected' : 'Lower route selected', panelX + 8, panelY + 111);
            ctx.restore();
        }

        function drawStoryboardMessage() {
            if (!tutorialMessage || tutorialMessageTimer <= 0) return;
            if (tutorialBeatIndex < STORYBOARD_BEATS.length) {
                const activeBeat = STORYBOARD_BEATS[tutorialBeatIndex];
                if (Math.abs(wizard.x - activeBeat.triggerX) > 850) return;
            }

            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = 'bold 30px Arial';
            const isSuccess = tutorialMessage.toLowerCase().includes('good job') || tutorialMessage.toLowerCase().includes('great job');
            ctx.fillStyle = isSuccess ? '#A9FF70' : '#FFD86A';
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.lineWidth = 6;
            ctx.strokeText(tutorialMessage, canvas.width / 2, 145);
            ctx.fillText(tutorialMessage, canvas.width / 2, 145);
            ctx.restore();
        }

        function drawStoryboardCue() {
            if (tutorialBeatIndex >= STORYBOARD_BEATS.length) return;
            const beat = STORYBOARD_BEATS[tutorialBeatIndex];
            if (!beat.cue || wizard.x < beat.triggerX) return;

            const pulse = 1 + Math.sin(Date.now() / 180) * 0.12;
            const cueX = beat.cue.x - cameraX;
            const cueY = beat.cue.y;

            ctx.save();
            ctx.strokeStyle = '#FFE066';
            ctx.lineWidth = 3;
            ctx.strokeRect(cueX - 6 * pulse, cueY - 6 * pulse, beat.cue.width + 12 * pulse, beat.cue.height + 12 * pulse);

            ctx.fillStyle = '#FFE066';
            ctx.beginPath();
            ctx.moveTo(cueX + beat.cue.width / 2, cueY - 30);
            ctx.lineTo(cueX + beat.cue.width / 2 - 10, cueY - 12);
            ctx.lineTo(cueX + beat.cue.width / 2 + 10, cueY - 12);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("Wizard's Mountain", canvas.width / 2, 100);
            ctx.fillText('Adventure', canvas.width / 2, 160);

            ctx.font = 'bold 30px Arial';
            ctx.fillText('Objectives:', canvas.width / 2, 240);

            ctx.font = '18px Arial';
            ctx.fillText('✓ Navigate through the mountain', canvas.width / 2, 280);
            ctx.fillText('✓ Collect green crystals for points', canvas.width / 2, 310);
            ctx.fillText('✓ Destroy obstacles with fireballs', canvas.width / 2, 340);
            ctx.fillText('✓ Reach the end of the level', canvas.width / 2, 370);
            ctx.fillText('✓ Starts easy and gets harder as you progress', canvas.width / 2, 400);

            ctx.font = 'bold 24px Arial';
            ctx.fillText('Controls:', canvas.width / 2, 440);
            ctx.font = '18px Arial';
            ctx.fillText('← → or A/D to move | SPACE to jump | Z to shoot', canvas.width / 2, 475);

            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Start!', canvas.width / 2, 545);
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FF0000';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, 150);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 300);

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Restart', canvas.width / 2, 450);
        }

        function drawLevelCompleteScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, 150);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 30px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 280);
            ctx.fillText(`Health: ${'❤'.repeat(health)}`, canvas.width / 2, 330);

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Play Again', canvas.width / 2, 450);

            ctx.fillStyle = '#00FF00';
            ctx.font = 'bold 28px Arial';
            ctx.fillText('Great Job! 🎉', canvas.width / 2, 520);
        }

        function drawPausedScreen() {
            drawBackground();
            drawPlatforms();
            drawObstacles();
            drawCrystals();
            drawSigns();
            drawForkArrows();
            wizard.draw();
            drawFireballs();
            drawUI();
            drawStoryboardMessage();
            drawStoryboardCue();

            ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.textAlign = 'center';
            ctx.font = 'bold 52px Arial';
            ctx.fillText('PAUSED', canvas.width / 2, 260);
            ctx.font = 'bold 22px Arial';
            ctx.fillText('Press ESC to continue', canvas.width / 2, 320);
        }

        // Game Loop
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === GAME_STATE.START) {
                drawStartScreen();
            } else if (gameState === GAME_STATE.PLAYING) {
                // Update
                currentDifficulty = getDifficultyByPosition();
                wizard.update();
                updateObstacles();
                updateStoryboardFlow();
                updateRouteChoice();
                if (obstacleDamageCooldown > 0) obstacleDamageCooldown--;
                if (routeMessageTimer > 0) routeMessageTimer--;

                // Update fireballs
                for (let i = fireballs.length - 1; i >= 0; i--) {
                    fireballs[i].update();
                    if (fireballs[i].lifetime <= 0) {
                        fireballs.splice(i, 1);
                    }
                }

                // Update crystals
                for (let i = crystals.length - 1; i >= 0; i--) {
                    if (crystals[i].update()) {
                        crystals.splice(i, 1);
                    }
                }

                // Check collision with obstacles
                for (let obs of obstacles) {
                    if (!isObstacleActive(obs)) continue;
                    if (isClimbableObstacle(obs)) continue;
                    if (obstacleDamageCooldown > 0) continue;
                    if (wizard.x < obs.x + obs.width &&
                        wizard.x + wizard.width > obs.x &&
                        wizard.y < obs.y + obs.height &&
                        wizard.y + wizard.height > obs.y) {
                        if (currentDifficulty.stage > 1) {
                            health--;
                        }
                        obstacleDamageCooldown = 50;
                        if (health <= 0) {
                            gameState = GAME_STATE.GAME_OVER;
                        } else {
                            resetTutorialFlow(true, true);
                            wizard.reset();
                        }
                    }
                }

                // Draw
                drawBackground();
                drawPlatforms();
                drawObstacles();
                drawCrystals();
                drawSigns();
                drawForkArrows();
                wizard.draw();
                drawFireballs();
                drawUI();
                drawStoryboardMessage();
                drawStoryboardCue();
                drawRouteMessage();
            } else if (gameState === GAME_STATE.PAUSED) {
                drawPausedScreen();
            } else if (gameState === GAME_STATE.GAME_OVER) {
                drawGameOverScreen();
            } else if (gameState === GAME_STATE.LEVEL_COMPLETE) {
                drawLevelCompleteScreen();
            }

            requestAnimationFrame(gameLoop);
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState === GAME_STATE.START) {
                    gameState = GAME_STATE.PLAYING;
                    currentDifficulty = { stage: 1, label: 'Apprentice' };
                    obstacleDamageCooldown = 0;
                    createLevel();
                    resetTutorialFlow(true);
                } else if (gameState === GAME_STATE.PLAYING) {
                    wizard.jump();
                } else if (gameState === GAME_STATE.GAME_OVER || gameState === GAME_STATE.LEVEL_COMPLETE) {
                    // Reset game
                    score = 0;
                    health = MAX_HEALTH;
                    cameraX = 0;
                    currentDifficulty = { stage: 1, label: 'Apprentice' };
                    obstacleDamageCooldown = 0;
                    resetTutorialFlow(false);
                    wizard.reset();
                    fireballs = [];
                    gameState = GAME_STATE.START;
                }
            }

            if (e.key === 'z' || e.key === 'Z') {
                if (gameState === GAME_STATE.PLAYING) {
                    shootActionCount++;
                    wizard.shoot();
                }
            }

            if (e.key === 'Escape') {
                if (gameState === GAME_STATE.PLAYING) {
                    gameState = GAME_STATE.PAUSED;
                } else if (gameState === GAME_STATE.PAUSED) {
                    gameState = GAME_STATE.PLAYING;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('click', () => {
            if (gameState === GAME_STATE.PLAYING) {
                shootActionCount++;
                wizard.shoot();
            }
        });

        // Handle continuous movement
        setInterval(() => {
            if (gameState === GAME_STATE.PLAYING) {
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    wizard.moveLeft();
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    wizard.moveRight();
                }
            }
        }, 20);

        // Start game
        gameLoop();
    </script>
</body>
</html>
